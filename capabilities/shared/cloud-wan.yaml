naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Cloud WAN"
  description: "API for building and managing global wide area networks, connecting branch offices, data centers, and VPCs with centralized control, monitoring, and network policy automation."
  tags:
    - Amazon Web Services
    - Amazon Cloud WAN
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cloudwan
      baseUri: https://networkmanager.us-east-1.amazonaws.com
      description: "Amazon Cloud WAN API."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources: []

  exposes:
    - type: rest
      port: 8100
      namespace: cloudwan-rest
      resources: []

    - type: mcp
      port: 9100
      namespace: cloudwan-mcp
      transport: http
      tools: []
