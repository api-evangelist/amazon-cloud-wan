naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Cloud WAN WAN Management"
  description: "Workflow for wan management using Amazon Cloud WAN for Network Engineer personas."
  tags:
    - Amazon Web Services
    - Amazon Cloud WAN
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: cloudwan
      location: ./shared/cloud-wan.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: cloudwan-workflow-api
      description: "Unified REST API for Amazon Cloud WAN wan management."
      resources: []

    - type: mcp
      port: 9090
      namespace: cloudwan-workflow-mcp
      transport: http
      description: "MCP server for AI-assisted Amazon Cloud WAN wan management."
      tools: []
